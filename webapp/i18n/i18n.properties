initialMessage=<p><strong>Recomendaciones generales</strong></p>\
<ul>\
<li>Recuerde solicitar su tiquete con al menos 14 días de anticipación, de esta forma nos ahorraremos el 30% del valor del tiquete.</li>\
<li>Consulte la <a href="https://apps.powerapps.com/play/e/default-41fcf016-4f75-4252-9a1f-a321378b5440/a/1880dc69-9377-46d2-8bd2-f856dad66532?tenantId=41fcf016-4f75-4252-9a1f-a321378b5440&amp;hint=1c126b8a-7191-4a16-afa2-cc13c1665f2b" target="_blank">política de gastos de viaje PO-AD-01</a> para cualquier duda respecto al proceso de compra de tiquetes, equipaje y gastos permitidos, así como de las sanciones por pérdida o no uso de tiquetes aéreos.</li>\
<li>Si requiere visa para un viaje internacional, recuerde hacer su solicitud al área legal.</li>\
<li>Si el viaje es para uno o varios clientes, solicite el formato de creación de usuarios al área administrativa, asimismo, no olvide diligenciar el flujo de preaprobación y aprobación de gastos a terceros</li>\
<li>Revise de forma cuidadosa las opciones cotizadas y recuerde que después de comprado el tiquete, cualquier cambio conlleva un costo adicional.</li>\
</ul>\
<p><strong>Tipos de equipaje</strong></p>\
Generalmente, las aerolíneas tienen 3 tipos de tarifa para equipaje:\
<ul>\
<li><strong>Básica</strong>: Únicamente incluye un artículo personal, que corresponde a un bolso o morral que se pueda ubicar en el piso debajo de la silla del avión.</li>\
<li><strong>Media</strong>: Incluye un artículo personal y adicional incluye un equipaje de mano de máximo 10kg de peso y que viaja en los compartimientos superiores de la cabina del avión.</li>\
<li><strong>Full</strong>: Incluye un artículo personal, un equipaje de mano y una maleta de bodega de máximo 23kg de peso y que viaja en la bodega del avión.</li>\
<li><strong>NOTA:</strong> El peso del equipaje puede variar según las regulaciones de cada aerolínea, se recomienda revisar las condiciones de equipaje una vez emitido el tiquete</li>\
</ul>\
<p><strong>Tiempos y consideraciones</strong></p>\
<ul>\
</li>\
<li>Para viajes nacionales se debe llegar al aeropuerto mínimo 2 horas antes de la salida del vuelo.</li>\
<li>Para viajes internacionales se debe llegar al aeropuerto mínimo 3 horas antes de la salida del vuelo.</li>\
<li>Si tiene problemas para realizar el check in, por favor comuníquese con el área administrativa para tener soporte.</li>\
<li>Si solicita reserva de hotel, recuerde que el área administrativa reservará un hotel de acuerdo con los convenios existentes en cada ciudad, en caso de viajar a una ciudad y/o país donde no se tenga convenio, la persona deberá solicitar dentro del valor de sus gastos de viaje, el valor del hotel.</li>\
<li>El precio de los tiquetes suele cambiar constantemente, por este motivo, si pasadas 24 horas no se ha tenido aprobación, el flujo será rechazado y se deberá volver a subir uno nuevo.</li>\
<li>Si la persona requiere quedarse días adicionales en la ciudad de destino por temas personales, deberá asumir sus gastos de estos días adicionales y no podrá reportarlos como viáticos, asimismo, si hay una diferencia en el costo del tiquete, esta deberá ser asumida por el pasajero.</li>\
</ul>

